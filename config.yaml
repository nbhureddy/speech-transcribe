# ============================================================
# live-transcriber — default configuration
# ============================================================
# Copy / edit this file and pass it with:  live-transcriber --config path/to/config.yaml

model:
  size: large-v3-turbo   # tiny | base | small | medium | large-v3 | large-v3-turbo
  language: en           # BCP-47 language code; null to auto-detect
  compute_type: float16  # float16 | int8 | float32
  # backend selects the inference engine:
  #   mlx-whisper    — native Apple Silicon (M1/M2/M3/M4) via MLX; best speed+accuracy on Mac
  #   faster-whisper — ctranslate2; cross-platform fallback (Linux, Windows, non-Apple Macs)
  backend: mlx-whisper

audio:
  sample_rate: 16000
  channels: 1
  chunk_seconds: 6     # length of each transcription window
  overlap_seconds: 1   # overlap between consecutive windows
  block_size: 4096     # sounddevice InputStream blocksize (samples)

transcription:
  vad_filter: true
  min_silence_duration_ms: 500
  beam_size: 1
  best_of: 5
  temperature: 0.0

output:
  transcript_dir: transcripts  # folder where per-run transcript files are written

logging:
  level: INFO          # DEBUG | INFO | WARNING | ERROR
  log_file: null       # set to e.g. "logs/app.log" to also write to a file
  suppress_third_party: true  # silence faster_whisper / ctranslate2 INFO noise

debug: false

# ============================================================
# LLM refinement (runs at end of session on CTRL+C)
# ============================================================
llm:
  enabled: false          # set to true to enable post-processing
  provider: openai        # openai | ollama | anthropic
  model: gpt-4o-mini      # model name for the chosen provider

  # API key — leave null to read from env var (OPENAI_API_KEY / ANTHROPIC_API_KEY)
  api_key: null

  # Override API endpoint. Examples:
  #   Ollama local : http://localhost:11434/v1
  #   Azure OpenAI : https://<resource>.openai.azure.com/openai/deployments/<deploy>
  base_url: null

  temperature: 0.1        # keep low for faithful reproduction
  max_tokens: 4096
  timeout_seconds: null   # provider default; Ollama uses a much larger timeout when null

  # Chunking for local/small models — splits long transcripts so they fit in
  # the model's context window. 0 = disabled for cloud providers; very large
  # Ollama transcripts auto-chunk to avoid one giant local request.
  # Recommended manual settings: 1500 for 7-9B models, 3000 for 12B+ models.
  chunk_tokens: 0

# ------------------------------------------------------------
# Ollama local examples (copy into the llm: block above)
# ------------------------------------------------------------
#
# Best quality (instruction-following):
#   provider: ollama
#   model: qwen2.5:7b          # ollama pull qwen2.5:7b
#   base_url: http://localhost:11434/v1
#   chunk_tokens: 1500
#
# Good balance (quality vs speed):
#   provider: ollama
#   model: gemma2:9b            # ollama pull gemma2:9b
#   base_url: http://localhost:11434/v1
#   chunk_tokens: 1500
#
# Larger / higher quality:
#   provider: ollama
#   model: mistral-nemo:12b     # ollama pull mistral-nemo:12b
#   base_url: http://localhost:11434/v1
#   chunk_tokens: 3000
#
# Baseline (widely available):
#   provider: ollama
#   model: llama3.1:8b          # ollama pull llama3.1:8b
#   base_url: http://localhost:11434/v1
#   chunk_tokens: 1500
